                }</style></noscript><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous"><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm" crossorigin="anonymous"></script></head><body><script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script><div class="container-fluid"><div class="row"><div id="canvasParent" class="col-12 w-100" style="position:fixed; z-index:-1"></div></div></div><script>var x = 0;
var y = 0; 
var c_x = 0;
var c_y = 0; 

// 網格粒子系統
let particles = [];
const GRID_RES = 24; // 稍微調密一點點，讓點陣結構更精緻（原本是 30）

function setup() {
  var canvasParent = document.getElementById("canvasParent");
  const canvas = createCanvas(windowWidth, windowHeight);
  canvas.parent("canvasParent");
  canvas.style("display", "block");
  canvas.style("position", "fixed");
  canvas.style("left", "0px");
  canvas.style("top", "0px");
  canvas.style("width", "100vw");
  
  initGrid();
}

function initGrid() {
  particles = [];
  for (let gridX = GRID_RES; gridX < width; gridX += GRID_RES) {
    for (let gridY = GRID_RES; gridY < height; gridY += GRID_RES) {
      particles.push(new GridParticle(gridX, gridY));
    }
  }
}

function draw() {
  // 保持乾淨的白背景
  background(255);
  
  // 1. 更新並繪製網格粒子
  for (let p of particles) {
    p.interactWithMouse();
    p.display();
  }
  
  // 2. 原本的滑鼠延遲追蹤圓圈（也將顏色調淡，使其不干擾）
  stroke(230);
  strokeWeight(1);
  fill(255, 255, 255, 0);
  
  c_x = lerp(x, mouseX, 0.10);
  c_y = lerp(y, mouseY, 0.10);
  
  x = c_x;
  y = c_y;
  
  circle(x, y, 40); // 縮小一點滑鼠圓圈
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  initGrid();
}

// 網格粒子類別
class GridParticle {
  constructor(homeX, homeY) {
    this.homeX = homeX;
    this.homeY = homeY;
    this.x = homeX;
    this.y = homeY;
    
    this.shapeType = random(1) > 0.3 ? 0 : 1; // 0 = 圓形, 1 = 方形
    this.isFilled = random(1) > 0.85; // 提高空心比例，讓畫面更乾淨
    
    // 【調整重點：尺寸大幅縮小】
    // 絕大多數是 1~2px 的細小點，極少數是大一點點的圈（4~8px），適度破壞單調感
    this.baseSize = random(1) > 0.92 ? random(2, 12) : random(3, 2.5); 
    this.currentSize = this.baseSize;
    
    // 【調整重點：顏色極淡，避免干涉閱讀】
    // 亮度拉高到 200~230（非常淡的灰色），透明度偏低
    let gray = random(30, 200);
    this.alpha = random(40, 100);
    this.col = color(gray, gray, gray, this.alpha);
    
    // 每顆粒子有獨立的時間偏移量，創造「非同步」的呼吸感
    this.timeOffset = random(1000);
    this.noiseSeedX = random(1000);
    this.noiseSeedY = random(1000);
  }

  interactWithMouse() {
    let d = dist(mouseX, mouseY, this.homeX, this.homeY);
    let maxDist = 150; // 縮小滑鼠影響範圍
    
    // 1. 【新增：平日的微幅有機漂移與非同步縮放】
    // 使用 Perlin Noise 讓粒子在沒滑鼠時也有極其微弱的位移（0.5px 內）
    let nX = map(noise(this.noiseSeedX + frameCount * 0.002), 0, 1, -0.4, 0.4);
    let nY = map(noise(this.noiseSeedY + frameCount * 0.002), 0, 1, -0.4, 0.4);
    
    // 使用 sin 波創造慢速自主呼吸縮放效果（振幅小、速度慢）
    let breathe = sin(frameCount * 0.05 + this.timeOffset) * (this.baseSize * 0.25);
    let idleSize = this.baseSize + breathe;

    // 2. 計算滑鼠干涉
    if (d < maxDist && d > 0) {
      let force = map(d, 0, maxDist, 1, 0);
      // 滑鼠經過時，粒子產生細微的排斥位移
      let targetX = this.homeX + (this.homeX - mouseX) * force * 0.15 + nX;
      let targetY = this.homeY + (this.homeY - mouseY) * force * 0.15 + nY;
      
      this.x = lerp(this.x, targetX, 0.1);
      this.y = lerp(this.y, targetY, 0.1);
      
      // 滑鼠過來時稍微放大（最大不超過原本的 1.8 倍），維持低調
      this.currentSize = lerp(this.currentSize, idleSize * (5 + force * 5), 0.1);
    } else {
      // 3. 沒有滑鼠時，優雅回歸自主呼吸狀態
      this.x = lerp(this.x, this.homeX + nX, 0.05);
      this.y = lerp(this.y, this.homeY + nY, 0.05);
      this.currentSize = lerp(this.currentSize, idleSize, 0.05);
    }
  }

  display() {
    push();
    translate(this.x, this.y);
    
    if (this.isFilled) {
      noStroke();
      fill(this.col);
    } else {
      noFill();
      stroke(this.col);
      strokeWeight(0.5); // 極細的灰線
    }
    
    if (this.shapeType === 0) {
      ellipse(0, 0, this.currentSize);
    } else if (this.shapeType === 1) {
      rectMode(CENTER);
      rect(0, 0, this.currentSize, this.currentSize);
    }
    pop();
  }
}</script><div class="container"><header class="header" id="js-header"><a href="https://chunred.github.io/No-Side-Here/" class="logo"><img src="https://chunred.github.io/No-Side-Here/media/website/Gong-Zuo-Qu-Yu-1_1-2.png" alt="No-Side-Here" width="568" height="568"></a><nav class="navbar js-navbar"><button class="navbar__toggle js-toggle" aria-label="Menu"><span class="navbar__toggle-box"><span class="navbar__toggle-inner">Menu</span></span></button><ul class="navbar__menu"><li><a href="https://chunred.github.io/No-Side-Here/" target="_self">Project</a></li><li><a href="https://chunred.github.io/No-Side-Here/people.html" target="_self">Member</a></li></ul></nav></header><main class="page page--tag"><div class="hero wrapper"><h1>Artwork <sup>(7)</sup></h1></div><div class="l-col l-col--3"><section class="c-card"><a href="https://chunred.github.io/No-Side-Here/pop-moon-7.html" class="c-card__link"><div class="c-card__header"><img src="https://chunred.github.io/No-Side-Here/media/posts/24/IMG_9954.JPG" srcset="https://chunred.github.io/No-Side-Here/media/posts/24/responsive/IMG_9954-xs.JPG 300w, https://chunred.github.io/No-Side-Here/media/posts/24/responsive/IMG_9954-sm.JPG 480w, https://chunred.github.io/No-Side-Here/media/posts/24/responsive/IMG_9954-md.JPG 768w, https://chunred.github.io/No-Side-Here/media/posts/24/responsive/IMG_9954-lg.JPG 1024w, https://chunred.github.io/No-Side-Here/media/posts/24/responsive/IMG_9954-xl.JPG 1360w, https://chunred.github.io/No-Side-Here/media/posts/24/responsive/IMG_9954-2xl.JPG 1600w, https://chunred.github.io/No-Side-Here/media/posts/24/responsive/IMG_9954-sm2.JPG 375w" sizes="(min-width: 75em) 25vw, (min-width: 56.25em) 33vw, (min-width: 37.5em) 50vw, 100vw" loading="lazy" height="6000" width="4000" alt=""></div><div class="c-card__body c-card__body--compact"><div class="c-card__text c-card__text--compact"><h2>無感滯留｜Insensible Retention  </h2></div></div></a></section><section class="c-card"><a href="https://chunred.github.io
