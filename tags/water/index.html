<!DOCTYPE html><html lang="en-gb"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tag: Water - No-Side-Here</title><meta name="robots" content="noindex, follow"><meta name="generator" content="Publii Open-Source CMS for Static Site"><link rel="alternate" type="application/atom+xml" href="https://chunred.github.io/No-Side-Here/feed.xml" title="No-Side-Here - RSS"><link rel="alternate" type="application/json" href="https://chunred.github.io/No-Side-Here/feed.json" title="No-Side-Here - JSON"><meta property="og:title" content="Tag: Water - No-Side-Here"><meta property="og:image" content="https://chunred.github.io/No-Side-Here/media/website/Gong-Zuo-Qu-Yu-1_1.png"><meta property="og:image:width" content="568"><meta property="og:image:height" content="568"><meta property="og:site_name" content="No-Side-Here"><meta property="og:description" content=""><meta property="og:url" content="https://chunred.github.io/No-Side-Here/tags/water/"><meta property="og:type" content="website"><link rel="stylesheet" href="https://chunred.github.io/No-Side-Here/assets/css/style.css?v=4103aa143eacd79cd4cf7de247fa6300"><script type="application/ld+json">{"@context":"http://schema.org","@type":"Organization","name":"No-Side-Here","logo":"https://chunred.github.io/No-Side-Here/media/website/Gong-Zuo-Qu-Yu-1_1-2.png","url":"https://chunred.github.io/No-Side-Here/"}</script><noscript><style>img[loading] {
                    opacity: 1;
                }</style></noscript><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous"><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm" crossorigin="anonymous"></script></head><body><script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script><div class="container-fluid"><div class="row"><div id="canvasParent" class="col-12 w-100" style="position:fixed; z-index:-1"></div></div></div><script>var x = 0;
var y = 0; 
var c_x = 0;
var c_y = 0; 
var target_x = 0;
var target_y = 0;
let bg;

// 粒子系統相關變數
let particles = [];
const PARTICLE_COUNT = 45; // 粒子總數

function setup() {
  var canvasParent = document.getElementById("canvasParent");
  const canvas = createCanvas(windowWidth, windowHeight);
  canvas.parent("canvasParent");
  canvas.style("display", "block");
  canvas.style("position", "fixed");
  canvas.style("left", "0px");
  canvas.style("top", "0px");
  canvas.style("width", "100vw");
  
  // 初始化粒子
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle(random(width), random(height)));
  }
}

function draw() {
  background(255, 100);
  
  // 1. 更新、計算與滑鼠互動、並繪製粒子
  for (let p of particles) {
    p.interactWithMouse();
    p.update();
    p.display();
  }
  
  // 2. 原本的滑鼠延遲追蹤圓圈
  stroke(200);
  strokeWeight(2);
  fill(255, 255, 255, 0);
  
  c_x = lerp(x, mouseX, 0.10);
  c_y = lerp(y, mouseY, 0.10);
  
  x = c_x;
  y = c_y;
  
  circle(x, y, 50);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

// 粒子類別 (Particle Class)
class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    
    // 預設的慢速基礎速度 (漂散速度)
    this.baseVx = random(-0.2, 0.2);
    this.baseVy = random(-0.1, -0.5); 
    
    // 當前的實際速度
    this.vx = this.baseVx;
    this.vy = this.baseVy;
    
    this.size = random(2, 10);
    this.shapeType = floor(random(3)); // 0=圓, 1=方, 2=三角
    
    // 新增：空心與實心 (true = 實心, false = 空心)
    this.isFilled = random(1) > 0.5; 
    
    // 顏色設定（灰到黑）
    let gray = random(30, 150);
    this.alpha = random(60, 140);
    this.col = color(gray, gray, gray, this.alpha);
    
    this.angle = random(TWO_PI);
    this.rotSpeed = random(-0.01, 0.01);
  }

  // 與滑鼠互動的物理行為
  interactWithMouse() {
    let d = dist(mouseX, mouseY, this.x, this.y);
    let maxDist = 120; // 滑鼠的感應排斥半徑
    
    if (d < maxDist && d > 0) {
      // 計算排斥力的方向向量
      let forceX = (this.x - mouseX) / d;
      let forceY = (this.y - mouseY) / d;
      
      // 距離越近，推力越強
      let strength = map(d, 0, maxDist, 4, 0); 
      
      // 將排斥力疊加到當前速度上
      this.vx += forceX * strength * 0.1;
      this.vy += forceY * strength * 0.1;
    }
    
    // 摩擦力：讓粒子在被滑鼠彈開後，逐漸減速恢復到原本的微弱飄散速度
    this.vx = lerp(this.vx, this.baseVx, 0.05);
    this.vy = lerp(this.vy, this.baseVy, 0.05);
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.angle += this.rotSpeed;

    // 邊界檢查
    if (this.y < -this.size) {
      this.y = height + this.size;
      this.x = random(width);
    }
    if (this.y > height + this.size) {
      this.y = -this.size;
      this.x = random(width);
    }
    if (this.x < -this.size) this.x = width + this.size;
    if (this.x > width + this.size) this.x = -this.size;
  }

  display() {
    push();
    translate(this.x, this.y);
    rotate(this.angle);
    
    // 根據實心或空心配置填色與線條
    if (this.isFilled) {
      noStroke();
      fill(this.col);
    } else {
      noFill();
      stroke(this.col);
      strokeWeight(0.5); // 空心外框粗細
    }
    
    // 繪製形狀
    if (this.shapeType === 0) {
      ellipse(0, 0, this.size);
    } else if (this.shapeType === 1) {
      rectMode(CENTER);
      rect(0, 0, this.size, this.size);
    } else if (this.shapeType === 2) {
      let r = this.size / 2;
      triangle(0, -r, -r, r, r, r);
    }
    pop();
  }
}</script><div class="container"><header class="header" id="js-header"><a href="https://chunred.github.io/No-Side-Here/" class="logo"><img src="https://chunred.github.io/No-Side-Here/media/website/Gong-Zuo-Qu-Yu-1_1-2.png" alt="No-Side-Here" width="568" height="568"></a><nav class="navbar js-navbar"><button class="navbar__toggle js-toggle" aria-label="Menu"><span class="navbar__toggle-box"><span class="navbar__toggle-inner">Menu</span></span></button><ul class="navbar__menu"><li><a href="https://chunred.github.io/No-Side-Here/" target="_self">Project</a></li><li><a href="https://chunred.github.io/No-Side-Here/people.html" target="_self">Member . . .</a></li></ul></nav></header><main class="page page--tag"><div class="hero wrapper"><h1>Water <sup>(3)</sup></h1></div><div class="l-col l-col--3"><section class="c-card"><a href="https://chunred.github.io/No-Side-Here/pop-moon-3.html" class="c-card__link"><div class="c-card__header"><img src="https://chunred.github.io/No-Side-Here/media/posts/18/IMG_4938-2.jpg" srcset="https://chunred.github.io/No-Side-Here/media/posts/18/responsive/IMG_4938-2-xs.jpg 300w, https://chunred.github.io/No-Side-Here/media/posts/18/responsive/IMG_4938-2-sm.jpg 480w, https://chunred.github.io/No-Side-Here/media/posts/18/responsive/IMG_4938-2-md.jpg 768w, https://chunred.github.io/No-Side-Here/media/posts/18/responsive/IMG_4938-2-lg.jpg 1024w, https://chunred.github.io/No-Side-Here/media/posts/18/responsive/IMG_4938-2-xl.jpg 1360w, https://chunred.github.io/No-Side-Here/media/posts/18/responsive/IMG_4938-2-2xl.jpg 1600w, https://chunred.github.io/No-Side-Here/media/posts/18/responsive/IMG_4938-2-sm2.jpg 375w" sizes="(min-width: 75em) 25vw, (min-width: 56.25em) 33vw, (min-width: 37.5em) 50vw, 100vw" loading="lazy" height="3024" width="4032" alt=""></div><div class="c-card__body c-card__body--compact"><div class="c-card__text c-card__text--compact"><h2>浮海 ｜Pulsation Sea</h2></div></div></a></section><section class="c-card"><a href="https://chunred
