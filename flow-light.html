5_4.gif","height":720,"width":1280},"description":"Flow Light 希望透過光的象徵意義，使用者尋找、拾起、放置「光」的過程，進而感受到一點溫暖的情緒。&hellip;","author":{"@type":"Person","name":"chunhuang","url":"https://chunred.github.io/No-Side-Here/authors/chunhuang/"},"publisher":{"@type":"Organization","name":"chunhuang","logo":{"@type":"ImageObject","url":"https://chunred.github.io/No-Side-Here/media/website/Gong-Zuo-Qu-Yu-1_1-2.png","height":568,"width":568}}}</script><style>.pswp--svg .pswp__button,

			              }</style><noscript><style>img[loading] {

                }</style></noscript><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous"><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm" crossorigin="anonymous"></script></head><body><script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script><div class="container-fluid"><div class="row"><div id="canvasParent" class="col-12 w-100" style="position:fixed; z-index:-1"></div></div></div><script>var x = 0;
var y = 0; 
var c_x = 0;
var c_y = 0; 
var target_x = 0;
var target_y = 0;
let bg;

// 粒子系統相關變數
let particles = [];
const PARTICLE_COUNT = 45; // 粒子總數

function setup() {
  var canvasParent = document.getElementById("canvasParent");
  const canvas = createCanvas(windowWidth, windowHeight);
  canvas.parent("canvasParent");
  canvas.style("display", "block");
  canvas.style("position", "fixed");
  canvas.style("left", "0px");
  canvas.style("top", "0px");
  canvas.style("width", "100vw");
  
  // 初始化粒子
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle(random(width), random(height)));
  }
}

function draw() {
  background(255, 100);
  
  // 1. 更新、計算與滑鼠互動、並繪製粒子
  for (let p of particles) {
    p.interactWithMouse();
    p.update();
    p.display();
  }
  
  // 2. 原本的滑鼠延遲追蹤圓圈
  stroke(200);
  strokeWeight(2);
  fill(255, 255, 255, 0);
  
  c_x = lerp(x, mouseX, 0.10);
  c_y = lerp(y, mouseY, 0.10);
  
  x = c_x;
  y = c_y;
  
  circle(x, y, 50);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

// 粒子類別 (Particle Class)
class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    
    // 預設的慢速基礎速度 (漂散速度)
    this.baseVx = random(-0.2, 0.2);
    this.baseVy = random(-0.1, -0.5); 
    
    // 當前的實際速度
    this.vx = this.baseVx;
    this.vy = this.baseVy;
    
    this.size = random(2, 10);
    this.shapeType = floor(random(3)); // 0=圓, 1=方, 2=三角
    
    // 新增：空心與實心 (true = 實心, false = 空心)
    this.isFilled = random(1) > 0.5; 
    
    // 顏色設定（灰到黑）
    let gray = random(30, 150);
    this.alpha = random(60, 140);
    this.col = color(gray, gray, gray, this.alpha);
    
    this.angle = random(TWO_PI);
    this.rotSpeed = random(-0.01, 0.01);
  }

  // 與滑鼠互動的物理行為
  interactWithMouse() {
    let d = dist(mouseX, mouseY, this.x, this.y);
    let maxDist = 120; // 滑鼠的感應排斥半徑
    
    if (d < maxDist && d > 0) {
      // 計算排斥力的方向向量
      let forceX = (this.x - mouseX) / d;
      let forceY = (this.y - mouseY) / d;
      
      // 距離越近，推力越強
      let strength = map(d, 0, maxDist, 4, 0); 
      
      // 將排斥力疊加到當前速度上
      this.vx += forceX * strength * 0.1;
      this.vy += forceY * strength * 0.1;
    }
    
    // 摩擦力：讓粒子在被滑鼠彈開後，逐漸減速恢復到原本的微弱飄散速度
    this.vx = lerp(this.vx, this.baseVx, 0.05);
    this.vy = lerp(this.vy, this.baseVy, 0.05);
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.angle += this.rotSpeed;

    // 邊界檢查
    if (this.y < -this.size) {
      this.y = height + this.size;
      this.x = random(width);
    }
    if (this.y > height + this.size) {
      this.y = -this.size;
      this.x = random(width);
    }
    if (this.x < -this.size) this.x = width + this.size;
    if (this.x > width + this.size) this.x = -this.size;
  }

  display() {
    push();
    translate(this.x, this.y);
    rotate(this.angle);
    
    // 根據實心或空心配置填色與線條
    if (this.isFilled) {
      noStroke();
      fill(this.col);
    } else {
      noFill();
      stroke(this.col);
      strokeWeight(0.5); // 空心外框粗細
    }
    
    // 繪製形狀
    if (this.shapeType === 0) {
      ellipse(0, 0, this.size);
    } else if (this.shapeType === 1) {
      rectMode(CENTER);
      rect(0, 0, this.size, this.size);
    } else if (this.shapeType === 2) {
      let r = this.size / 2;
      triangle(0, -r, -r, r, r, r);
    }
    pop();
  }
}</script><div class="container"><header class="header" id="js-header"><a href="https://chunred.github.io/No-Side-Here/" class="logo"><img src="https://chunred.github.io/No-Side-Here/media/website/Gong-Zuo-Qu-Yu-1_1-2.png" alt="No-Side-Here" width="568" height="568"></a><nav class="navbar js-navbar"><button class="navbar__toggle js-toggle" aria-label="Menu"><span class="navbar__toggle-box"><span class="navbar__toggle-inner">Menu</span></span></button><ul class="navbar__menu"><li><a href="https://chunred.github.io/No-Side-Here/" target="_self">Project</a></li><li><a href="https://chunred.github.io/No-Side-Here/people.html" target="_self">Member . . .</a></li></ul></nav></header><main><article class="post wrapper"><header class="hero"><h1 class="post__title">Flow Light</h1></header><figure class="post__featured-image post__image--normal"><img src="https://chunred.github.io/No-Side-Here/media/posts/12/Ying-Mu-Lu-Ying-2023-10-01-Xia-Wu-7.12.35_4.gif" loading="eager" height="720" width="1280" alt=""></figure><div class="post__entry"><div><div style="width:100%; height:100%; position:fixed; top:0px; left:0px; background-color:rgb(0,0,0); z-index:-1;"></div></div><div><div class="card mb-3 text-white bg-dark"><div class="row g-0"><div class="col-12"><div class="card-body"><h5 class="card-title">Flow Light</h5><p class="card-text">希望透過光的象徵意義，使用者尋找、拾起、放置「光」的過程，進而感受到一點溫暖的情緒。</p><p class="card-text">黑夜之中，光是最耀眼的存在，星星、街燈、車流、熱鬧的街區之類；萬物皆有趨光性，植物、飛蟲，結束了白日繁忙、或者夜晚才剛開始了的人們等等。光輕輕流動，穿梭過指尖與歲月縫隙，人群聚集，人群散去，即使如此，或許還是有一份在等待著我們的光芒，指引著心之所向。尋到一份光，讓它陪你走一段路，再悄悄的留在某一處街道轉角，等下一個人拾起這份溫暖。</p></div></div></div></div></div><figure class="post__image post__image--center"><img loading="lazy" src="https://chunred.github.io/No-Side-Here/media/posts/12/Ying-Mu-Lu-Ying-2023-10-01-Xia-Wu-7.12.35_2.gif" height="720" width="1280" alt=""></figure><figure class="post__image post__image--center"><img loading="lazy" src="https://chunred.github.io/No-Side-Here/media/posts/12/ea05-2.gif" height="768" width="1024" alt="
